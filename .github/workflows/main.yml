name: Build Android APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake

    - name: Install Buildozer and Kivy
      run: |
        pip install --upgrade pip
        pip install buildozer cython kivy pillow

    - name: Initialize Buildozer
      run: buildozer init

    - name: Modify buildozer.spec (Auto Configure)
      run: |
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy,pillow/' buildozer.spec

    - name: Build APK with Buildozer
      run: buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Calculator-Android-APK
        path: bin/*.apk
        
